name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Required for OIDC federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x.x

      - name: Install Aspire CLI
        run: curl -sSL https://aspire.dev/install.sh | bash

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy with Aspire CLI
        run: aspire deploy --project ./src/Aspire/SilverbridgeWeb.AppHost/SilverbridgeWeb.AppHost.csproj --no-prompt
        env:
          Azure__SubscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
          Parameters__keycloakPassword: ${{ secrets.ASPIRE_KEYCLOAK_PASSWORD }}
          Parameters__PostgresPassword: ${{ secrets.ASPIRE_POSTGRES_PASSWORD }}
          Parameters__keycloak-confidential-client-secret: ${{ secrets.ASPIRE_KEYCLOAK_CONFIDENTIAL_CLIENT_SECRET }}
          Parameters__foireann-primary-api-key: ${{ secrets.ASPIRE_FOIREANN_PRIMARY_API_KEY }}
          Parameters__foireann-secondary-api-key: ${{ secrets.ASPIRE_FOIREANN_SECONDARY_API_KEY }}
          Parameters__keycloakClientSecret: ${{ secrets.ASPIRE_KEYCLOAK_CLIENT_SECRET }}
